<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>托福學習page4</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/mycss01.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/table-rwd.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .section-title {
            font-weight: bold;
        }

        .vocab-card {
            border: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        .vocab-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .table thead {
            background-color: #0d6efd;
            color: white;
        }

        .note-btn {
            background-color: #198754;
            color: white;
            border-radius: 20px;
            padding: 5px 12px;
            border: none;
        }

        .note-btn:hover {
            background-color: #157347;
        }
    </style>
</head>

<body>
    <section id="s01" class="py-5 text-center bg-white shadow-sm">
        <h1 class="section-title wow animate__animated animate__fadeInDown">
            TOEFL 英文單字
        </h1>
    </section>

    <section id="s02" class="py-3">
        <div class="container">
            <nav>
                <ul class="pagination justify-content-center">

                    <li class="page-item">
                        <a class="page-link" href="eng-TOEFL-start-learning-page3.html">Previous</a>
                    </li>

                    <li class="page-item">
                        <a class="page-link" href="eng-TOEFL-start-learning-page1.html">1</a>
                    </li>

                    <li class="page-item">
                        <a class="page-link" href="eng-TOEFL-start-learning-page2.html">2</a>
                    </li>
                    <li class="page-item">
                        <a class="page-link" href="eng-TOEFL-start-learning-page3.html">3</a>
                    </li>
                    <li class="page-item active">
                        <a class="page-link" href="#">4</a>
                    </li>
                    <li class="page-item">
                        <a class="page-link" href="eng-TOEFL-start-learning-page5.html">5</a>
                    </li>

                    <li class="page-item">
                        <a class="page-link" href="eng-TOEFL-start-learning-page5.html">Next</a>
                    </li>

                </ul>
            </nav>
        </div>
    </section>

    <section id="s03" class="py-5">
        <div class="container">

            <div class="card vocab-card shadow-sm wow animate__animated animate__fadeInUp">
                <div class="card-body">
                    <input type="text" id="searchInput" class="form-control mb-3" placeholder="搜尋單字...">
                    <table class="table table-hover align-middle text-center">
                        <thead>
                            <tr>
                                <th>英文單字</th>
                                <th>詞性</th>
                                <th>中文解釋</th>
                                <th>例句</th>
                                <th>筆記</th>
                            </tr>
                        </thead>

                        <tbody id="vocabTable">
                            <tr>
                                <td>maintain</td>
                                <td>(v.)</td>
                                <td>維持</td>
                                <td>Maintain a healthy lifestyle.</td>
                                <td><button class="note-btn">筆記</button></td>
                            </tr>
                        </tbody>
                    </table>

                </div>
            </div>

        </div>
    </section>

    <script src="jquery-4.0.0.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/sweetalert2@11.js"></script>
    <script src="js/wow.min.js"></script>
    <script src="https://unpkg.com/counterup2@2.0.2/dist/index.js"></script>

    <script>
        new WOW().init();

        const table = document.getElementById("vocabTable");

        function addWord(word, pos, meaning, sentence) {
            const newRow = table.insertRow();

            const cell1 = newRow.insertCell(0);
            const cell2 = newRow.insertCell(1);
            const cell3 = newRow.insertCell(2);
            const cell4 = newRow.insertCell(3);
            const cell5 = newRow.insertCell(4);

            cell1.textContent = word;
            cell2.textContent = pos;
            cell3.textContent = meaning;
            cell4.textContent = sentence;
            cell5.innerHTML = `<button class="note-btn">筆記</button>`;
        }
        addWord("method", "(n.)", "方法", "This method is effective.");
        addWord("obtain", "(v.)", "獲得", "She obtained a degree.");
        addWord("occur", "(v.)", "發生", "Accidents occur often.");
        addWord("participate", "(v.)", "參與", "Students participate in activities.");
        addWord("perceive", "(v.)", "感知", "How do you perceive the issue?");
        addWord("period", "(n.)", "時期", "During this period, growth increased.");
        addWord("policy", "(n.)", "政策", "The policy changed.");
        addWord("positive", "(adj.)", "正面的", "Positive results are encouraging.");
        addWord("previous", "(adj.)", "先前的", "The previous study shows…");
        addWord("primary", "(adj.)", "主要的", "The primary goal is learning.");
        addWord("process", "(n.)", "過程", "Learning is a process.");
        addWord("promote", "(v.)", "促進", "Promote healthy habits.");
        addWord("propose", "(v.)", "提出", "He proposed a new idea.");
        addWord("provide", "(v.)", "提供", "Schools provide education.");
    </script>



</body>

</html>
