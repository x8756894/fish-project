<head>

    <link rel="stylesheet" href="css/mycss01.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/table-rwd.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .section-title {
            font-weight: bold;
        }

        .vocab-card {
            border: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        .vocab-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .table thead {
            background-color: #0d6efd;
            color: white;
        }

        .note-btn {
            background-color: #198754;
            color: white;
            border-radius: 20px;
            padding: 5px 12px;
            border: none;
        }

        .note-btn:hover {
            background-color: #157347;
        }
    </style>
</head>

<body>
    <section id="s01" class="py-5 text-center bg-white shadow-sm">
        <h1 class="section-title wow animate__animated animate__fadeInDown">
            TOEFL 情緒與感覺英文單字
        </h1>
        <p class="text-muted">從日常生活開始，建立你的英文基礎</p>
    </section>

    <section id="s02" class="py-3">
        <div class="container">
            <nav>
                <ul class="pagination justify-content-center">

                    <li class="page-item">
                        <a class="page-link" href="eng-TOEFL-emotions4.html">Previous</a>

                    <li class="page-item">

                    <li class="page-item">

                    </li>
                    <li class="page-item active">
                        <a class="page-link" href="#">5</a>
                    </li>

                    <li class="page-item disabled">
                        <a class="page-link">Next</a>
                    </li>

                </ul>
            </nav>
        </div>
    </section>

    <section id="s03" class="py-5">
        <div class="container">

            <div class="card vocab-card shadow-sm wow animate__animated animate__fadeInUp">
                <div class="card-body">
                    <input type="text" id="searchInput" class="form-control mb-3" placeholder="搜尋單字...">
                    <table class="table table-hover align-middle text-center">
                        <thead>
                            <tr>
                                <th>英文單字</th>
                                <th>詞性</th>
                                <th>中文解釋</th>
                                <th>例句</th>
                                <th>筆記</th>
                            </tr>
                        </thead>

                        <tbody id="vocabTable">
                            <tr>
                                <td>thoughtful</td>
                                <td>(adj.)</td>
                                <td>沉思的</td>
                                <td>She looked thoughtful.</td>
                                <td><button class="note-btn">筆記</button></td>
                            </tr>
                        </tbody>
                    </table>

                </div>
            </div>

        </div>
    </section>

    <script src="jquery-4.0.0.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/sweetalert2@11.js"></script>
    <script src="js/wow.min.js"></script>
    <script src="https://unpkg.com/counterup2@2.0.2/dist/index.js"></script>

    <script>
        new WOW().init();

        const table = document.getElementById("vocabTable");

        function addWord(word, pos, meaning, sentence) {
            const newRow = table.insertRow();

            const cell1 = newRow.insertCell(0);
            const cell2 = newRow.insertCell(1);
            const cell3 = newRow.insertCell(2);
            const cell4 = newRow.insertCell(3);
            const cell5 = newRow.insertCell(4);

            cell1.textContent = word;
            cell2.textContent = pos;
            cell3.textContent = meaning;
            cell4.textContent = sentence;
            cell5.innerHTML = `<button class="note-btn">筆記</button>`;
        }
        addWord("curious", "(adj.)", "好奇的", "I’m curious about the result.");
        addWord("surprised", "(adj.)", "驚訝的", "He was surprised by the news.");
        addWord("shocked", "(adj.)", "震驚的", "She was shocked by the accident.");
        addWord("puzzled", "(adj.)", "困惑的", "I’m puzzled by this question.");
        addWord("relaxed", "(adj.)", "放鬆的", "He feels relaxed on vacation.");
        addWord("tired", "(adj.)", "疲倦的", "I’m tired after studying.");
        addWord("sleepy", "(adj.)", "想睡的", "She feels sleepy now.");
        addWord("aware", "(adj.)", "意識到的", "He is aware of the problem.");
        addWord("interested", "(adj.)", "感興趣的", "I’m interested in science.");
        addWord("passionate", "(adj.)", "熱情的", "She is passionate about music.");
        addWord("overwhelmed", "(adj.)", "不堪重負的", "He felt overwhelmed by work.");
        addWord("ecstatic", "(adj.)", "狂喜的", "She was ecstatic about winning.");
        addWord("horrified", "(adj.)", "驚恐的", "I was horrified by the scene.");
        addWord("outraged", "(adj.)", "憤慨的", "People were outraged by the news.");
    </script>



</body>
