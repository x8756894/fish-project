<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雅思練習1</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/mycss01.css">
    <link rel="stylesheet" href="css/table-rwd.css">
    <style>
        body {
            background-color: #eef3f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card-box {
            background-color: #ffffff;
            padding: 40px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .question {
            font-size: 28px;
            color: #2c5282;
            margin-bottom: 30px;
        }

        .option-btn {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            background-color: #a2d2ff;
            color: #333;
            transition: 0.3s;
        }

        .option-btn:hover {
            background-color: #7bb7ff;
            color: #fff;
        }
    </style>

</head>

<body>
    <div class="card-box">
        <div class="question">題目一</div>
        <div class="question" style="font-size: 20px;">affect</div>
        <button class="option-btn" onclick="checkAnswer(false)">音響</button>
        <button class="option-btn" onclick="checkAnswer(true)">影響</button>
    </div>


    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-4.0.0.js"></script>
    <script src="js/sweetalert2@11.js"></script>
    <script>
        function checkAnswer(isCorrect) {
            if (isCorrect) {
                Swal.fire({
                    title: '賓果!!!',
                    text: '水哦',
                    icon: 'success',
                    confirmButtonText: '下一題'
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = "eng-IELTS02.html";
                    }
                });
            } else {
                Swal.fire({
                    title: '答錯了！',
                    text: '天啊你不適合買刮刮樂',
                    icon: 'error',
                    confirmButtonText: '再一次'
                });
            }
        }
    </script>

</body>

</html>
