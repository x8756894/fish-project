<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 翻轉卡片</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/mycss01.css">
    <link rel="stylesheet" href="css/table-rwd.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .flip-card {
            width: 260px;
            height: 160px;
            perspective: 800px;
            margin: 2rem auto;
            transition: transform 0.3s;
        }

        .flip-card-inner {
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(.4, 2, .6, 1);
            transform-style: preserve-3d;
            position: relative;
            box-shadow: 0 6px 15px rgba(160, 110, 60, 0.3);
        }

        .flip-card:hover .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 18px;
            border: 4px solid #d2a679;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .flip-card-front {
            background: #f5deb3;
            color: #6b3e26;
        }

        .flip-card-back {
            background: #fff3c4;
            color: #a97142;
            transform: rotateY(180deg);
            border: 1px solid#d2a679;
        }
    </style>

</head>

<body>

    <body>
        <div class="card-container">
            <div class="flip-card">
                <div class="flip-card-inner">
                    <div class="flip-card-front">diet</div>
                    <div class="flip-card-back">飲食</div>
                </div>
            </div>

            <div class="flip-card">
                <div class="flip-card-inner">
                    <div class="flip-card-front">work</div>
                    <div class="flip-card-back">工作</div>
                </div>
            </div>

            <div class="flip-card">
                <div class="flip-card-inner">
                    <div class="flip-card-front">study</div>
                    <div class="flip-card-back">學習</div>
                </div>
            </div>

            <div class="flip-card">
                <div class="flip-card-inner">
                    <div class="flip-card-front">exercise</div>
                    <div class="flip-card-back">運動</div>
                </div>
            </div>
        </div>
        
        <script src="js/bootstrap.bundle.min.js"></script>
        <script src="js/jquery-4.0.0.js"></script>
        <script src="js/sweetalert2@11.js"></script>
    </body>

</body>

</html>
