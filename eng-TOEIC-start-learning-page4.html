<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多益學習page4</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/mycss01.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/table-rwd.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .section-title {
            font-weight: bold;
        }

        .vocab-card {
            border: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        .vocab-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .table thead {
            background-color: #0d6efd;
            color: white;
        }

        .note-btn {
            background-color: #198754;
            color: white;
            border-radius: 20px;
            padding: 5px 12px;
            border: none;
        }

        .note-btn:hover {
            background-color: #157347;
        }
    </style>
</head>

<body>
    <section id="s01" class="py-5 text-center bg-white shadow-sm">
        <h1 class="section-title wow animate__animated animate__fadeInDown">
            TOEIC 英文單字
        </h1>
    </section>

    <section id="s02" class="py-3">
        <div class="container">
            <nav>
                <ul class="pagination justify-content-center">

                    <li class="page-item">
                        <a class="page-link" href="eng-TOEIC-start-learning-page3.html">Previous</a>
                    </li>

                    <li class="page-item">
                        <a class="page-link" href="eng-TOEIC-start-learning-page1.html">1</a>
                    </li>

                    <li class="page-item">
                        <a class="page-link" href="eng-TOEIC-start-learning-page2.html">2</a>
                    </li>
                    <li class="page-item">
                        <a class="page-link" href="eng-TOEIC-start-learning-page3.html">3</a>
                    </li>
                    <li class="page-item active">
                        <a class="page-link" href="eng-TOEFL-start-learning-page4.html">4</a>
                    </li>
                    <li class="page-item">
                        <a class="page-link" href="eng-TOEIC-start-learning-page5.html">5</a>
                    </li>

                    <li class="page-item">
                        <a class="page-link" href="eng-TOEIC-start-learning-page5.html">Next</a>
                    </li>

                </ul>
            </nav>
        </div>
    </section>

    <section id="s03" class="py-5">
        <div class="container">

            <div class="card vocab-card shadow-sm wow animate__animated animate__fadeInUp">
                <div class="card-body">
                    <input type="text" id="searchInput" class="form-control mb-3" placeholder="搜尋單字...">
                    <table class="table table-hover align-middle text-center">
                        <thead>
                            <tr>
                                <th>英文單字</th>
                                <th>詞性</th>
                                <th>中文解釋</th>
                                <th>例句</th>
                                <th>筆記</th>
                            </tr>
                        </thead>

                        <tbody id="vocabTable">
                            <tr>
                                <td>payment</td>
                                <td>(n.)</td>
                                <td>付款</td>
                                <td>Payment is due today.</td>
                                <td><button class="note-btn">筆記</button></td>
                            </tr>
                        </tbody>
                    </table>

                </div>
            </div>

        </div>
    </section>

    <script src="jquery-4.0.0.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/sweetalert2@11.js"></script>
    <script src="js/wow.min.js"></script>
    <script src="https://unpkg.com/counterup2@2.0.2/dist/index.js"></script>

    <script>
        new WOW().init();

        const table = document.getElementById("vocabTable");

        function addWord(word, pos, meaning, sentence) {
            const newRow = table.insertRow();

            const cell1 = newRow.insertCell(0);
            const cell2 = newRow.insertCell(1);
            const cell3 = newRow.insertCell(2);
            const cell4 = newRow.insertCell(3);
            const cell5 = newRow.insertCell(4);

            cell1.textContent = word;
            cell2.textContent = pos;
            cell3.textContent = meaning;
            cell4.textContent = sentence;
            cell5.innerHTML = `<button class="note-btn">筆記</button>`;
        }
        addWord("performance", "(n.)", "表現", "Employee performance is good.");
        addWord("policy", "(n.)", "政策", "Company policy changed.");
        addWord("position", "(n.)", "職位", "She applied for a position.");
        addWord("presentation", "(n.)", "簡報", "He gave a presentation.");
        addWord("procedure", "(n.)", "程序", "Follow the procedure.");
        addWord("produce", "(v.)", "生產", "The factory produces goods.");
        addWord("profit", "(n.)", "利潤", "The company made a profit.");
        addWord("promotion", "(n.)", "升遷；促銷", "He got a promotion.");
        addWord("purchase", "(v./n.)", "購買", "I purchased a laptop.");
        addWord("quality", "(n.)", "品質", "The quality is high.");
        addWord("receive", "(v.)", "收到", "I received your email.");
        addWord("refund", "(n./v.)", "退款", "You can request a refund.");
        addWord("register", "(v.)", "註冊", "Register online.");
        addWord("report", "(n./v.)", "報告", "Submit a report.");
    </script>



</body>

</html>
