<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/mycss01.css">
    <link rel="stylesheet" href="css/table-rwd.css">
    <style>
        body {
            background-color: #eef3f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card-box {
            background-color: #ffffff;
            padding: 40px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .question {
            font-size: 28px;
            color: #2c5282;
            margin-bottom: 30px;
        }

        .option-btn {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            background-color: #a2d2ff;
            color: #333;
            transition: 0.3s;
        }

        .option-btn:hover {
            background-color: #7bb7ff;
            color: #fff;
        }
    </style>

</head>

<body>
    <div class="card-box">
        <div class="question">題目二

</html>
</div>
<div class="question" style="font-size: 20px;">a標籤用於定義？</div>
<button class="option-btn" onclick="checkAnswer(false)">蝴蝶結</button>
<button class="option-btn" onclick="checkAnswer(true)">超連結</button>
</div>


<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/jquery-4.0.0.js"></script>
<script src="js/sweetalert2@11.js"></script>
<script>
    function checkAnswer(isCorrect) {
        if (isCorrect) {
            Swal.fire({
                title: '賓果!!!',
                text: '水哦',
                icon: 'success',
                confirmButtonText: '下一題'
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({
                        title: "next",
                        text: "下一題.",
                        icon: "success"
                    });
                }
            });
        } else {
            Swal.fire({
                title: '答錯了！',
                text: '班導我對不起你',
                icon: 'error',
                confirmButtonText: '再一次'
            });
        }
    }
</script>

</body>

</html>
