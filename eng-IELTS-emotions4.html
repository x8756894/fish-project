<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/mycss01.css">
    <link rel="stylesheet" href="css/animate.min.css">
    <link rel="stylesheet" href="css/table-rwd.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .section-title {
            font-weight: bold;
        }

        .vocab-card {
            border: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        .vocab-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .table thead {
            background-color: #0d6efd;
            color: white;
        }

        .note-btn {
            background-color: #198754;
            color: white;
            border-radius: 20px;
            padding: 5px 12px;
            border: none;
        }

        .note-btn:hover {
            background-color: #157347;
        }
    </style>
</head>

<body>
    <section id="s01" class="py-5 text-center bg-white shadow-sm">
        <h1 class="section-title wow animate__animated animate__fadeInDown">
            IELTS 情緒與感覺相關英文單字
        </h1>
        <p class="text-muted">從日常生活開始，建立你的英文基礎</p>
    </section>

    <section id="s02" class="py-3">
        <div class="container">
            <nav>
                <ul class="pagination justify-content-center">

                    <li class="page-item">
                        <a class="page-link" href="eng-IELTS-emotions3.html">Previous</a>
                    </li>

                    <li class="page-item">

                    </li>
                    <li class="page-item active">
                        <a class="page-link" href="#">4</a>
                    </li>
                    <li class="page-item">
                        <a class="page-link" href="eng-IELTS-emotions5.html">5</a>
                    </li>

                    <li class="page-item">
                        <a class="page-link" href="eng-IELTS-emotions5.html">Next</a>
                    </li>

                </ul>
            </nav>
        </div>
    </section>

    <section id="s03" class="py-5">
        <div class="container">

            <div class="card vocab-card shadow-sm wow animate__animated animate__fadeInUp">
                <div class="card-body">
                    <input type="text" id="searchInput" class="form-control mb-3" placeholder="搜尋單字...">
                    <table class="table table-hover align-middle text-center">
                        <thead>
                            <tr>
                                <th>英文單字</th>
                                <th>詞性</th>
                                <th>中文解釋</th>
                                <th>例句</th>
                                <th>筆記</th>
                            </tr>
                        </thead>

                        <tbody id="vocabTable">
                            <tr>
                                <td>resentful</td>
                                <td>(adj.)</td>
                                <td>懷恨的</td>
                                <td>She felt resentful toward him.</td>
                                <td><button class="note-btn">筆記</button></td>
                            </tr>
                        </tbody>
                    </table>

                </div>
            </div>

        </div>
    </section>

    <script src="jquery-4.0.0.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/sweetalert2@11.js"></script>
    <script src="js/wow.min.js"></script>
    <script src="https://unpkg.com/counterup2@2.0.2/dist/index.js"></script>

    <script>
        new WOW().init();

        const table = document.getElementById("vocabTable");

        function addWord(word, pos, meaning, sentence) {
            const newRow = table.insertRow();

            const cell1 = newRow.insertCell(0);
            const cell2 = newRow.insertCell(1);
            const cell3 = newRow.insertCell(2);
            const cell4 = newRow.insertCell(3);
            const cell5 = newRow.insertCell(4);

            cell1.textContent = word;
            cell2.textContent = pos;
            cell3.textContent = meaning;
            cell4.textContent = sentence;
            cell5.innerHTML = `<button class="note-btn">筆記</button>`;
        }
        addWord("anxious", "(adj.)", "焦慮的", "He is anxious about the exam.");
        addWord("worried", "(adj.)", "擔心的", "She is worried about her health.");
        addWord("nervous", "(adj.)", "緊張的", "I feel nervous before speaking.");
        addWord("stressed", "(adj.)", "有壓力的", "He is stressed at work.");
        addWord("tense", "(adj.)", "緊張的", "The atmosphere was tense.");
        addWord("fearful", "(adj.)", "害怕的", "She is fearful of failure.");
        addWord("frightened", "(adj.)", "驚恐的", "The child was frightened by the noise.");
        addWord("terrified", "(adj.)", "非常害怕的", "He was terrified of flying.");
        addWord("panicked", "(adj.)", "驚慌的", "She panicked during the fire.");
        addWord("shocked", "(adj.)", "震驚的", "I was shocked by the news.");
        addWord("confused", "(adj.)", "困惑的", "He looked confused.");
        addWord("embarrassed", "(adj.)", "尷尬的", "She felt embarrassed in class.");
        addWord("guilty", "(adj.)", "愧疚的", "He felt guilty about lying.");
        addWord("ashamed", "(adj.)", "羞愧的", "She was ashamed of her behavior.");
    </script>



</body>
